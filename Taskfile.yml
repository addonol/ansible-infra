version: '3'

# ==============================================================================
# GLOBAL CONFIGURATION
# ==============================================================================
env:
  PYTHONWARNINGS: "ignore:.*Driver podman does not provide a schema.*"
  ANSIBLE_DEPRECATION_WARNINGS: "False"
  ANSIBLE_SKIP_CONFLICT_CHECK: "1"
  MOLECULE_NO_LOG: "True"

vars:
  VAULT_PASS: .vault_pass
  VAULT_OPTS: "--vault-password-file {{.VAULT_PASS}}"
  ANSIBLE_PLAY: uv run ansible-playbook
  PLAYBOOKS: "playbooks"

# ==============================================================================
# TASKS
# ==============================================================================
tasks:

  default:
    desc: "📖 List all available commands"
    cmds:
      - |
        BLUE=$(tput setaf 4); CYAN=$(tput setaf 6); WHITE=$(tput setaf 7); BOLD=$(tput bold); RESET=$(tput sgr0);

        task --list | grep "^\*" | awk -v b="$BLUE" -v c="$CYAN" -v w="$WHITE" -v r="$RESET" -v bd="$BOLD" '
          BEGIN {
            last_grp = "";
            width = 100;
            col_cmd = 30;
            col_gap = 5;
            limit = 60;

            banner = ""; for (i=1; i<=width; i++) banner = banner "=";
            sep = ""; for (i=1; i<=width; i++) sep = sep "─";

            print bd b banner r;
            print "  🏗️  " bd "ANSIBLE INFRASTRUCTURE CONTROL CENTER" r;
            print bd b banner r;
          }
          {
            split($2, parts, ":");
            current_grp = parts[1];

            if (last_grp != "" && current_grp != last_grp) {
                icon = "🛠️";
                if (current_grp == "airflow") icon = "🚀";
                else if (current_grp == "postgres") icon = "🐘";
                else if (current_grp == "rabbitmq") icon = "🐰";
                else if (current_grp == "test") icon = "🧪";
                else if (current_grp == "vault") icon = "🔐";
                else if (current_grp == "infra") icon = "⚙️";

                printf "\n %s%s %s %s %s\n", bd, b, toupper(current_grp), icon, r;
                printf " %s%s%s\n", b, sep, r;
            }

            cmd = $2;
            # --- NETTOYAGE DE LA DESCRIPTION (Suppression des emojis au début) ---
            desc = ""; for(i=3; i<=NF; i++) desc = desc $i (i==NF?"":" ");
            gsub(/^[^\x00-\x7F]+\s*/, "", desc); # Supprime les caractères non-ASCII (emojis) au début

            printf "  %s%-*s%s", bd c, col_cmd, cmd, r;

            first_line = 1;
            while (length(desc) > 0) {
                if (!first_line) printf "  %-*s%*s", col_cmd, "", col_gap, "";
                else printf "%*s", col_gap, "";

                if (length(desc) <= limit) {
                    line = desc; desc = "";
                } else {
                    split_pos = limit;
                    while (split_pos > 0 && substr(desc, split_pos, 1) != " ") split_pos--;
                    if (split_pos == 0) split_pos = limit;
                    line = substr(desc, 1, split_pos);
                    desc = substr(desc, split_pos + 1);
                }
                gsub(/^ +| +$/, "", line);
                printf "%s%s%s\n", w, line, r;
                first_line = 0;
            }
            last_grp = current_grp;
          }
          END { print "\n" bd b banner r }
        '
    silent: true


  # ----------------------------------------------------------------------------
  # SECTION: AIRFLOW
  # ----------------------------------------------------------------------------

  airflow:deploy:
    desc: "Deploy full Airflow 3 Celery stack"
    deps: [check-vault]
    silent: true
    cmds:
      - >
        {{.ANSIBLE_PLAY}} {{.PLAYBOOKS}}/deploy_airflow.yml {{.VAULT_OPTS}}

  airflow:purge:
    desc: "Purge all Airflow resources"
    deps: [check-vault]
    silent: true
    vars:
      airflow_common_purge_data: true
      airflow_common_purge_network: true
    cmds:
      - >
        {{.ANSIBLE_PLAY}} {{.PLAYBOOKS}}/clean_airflow.yml
        -e "airflow_common_purge_data={{.airflow_common_purge_data}}"
        -e "airflow_common_purge_network={{.airflow_common_purge_network}}"

  airflow:test:
    desc: "Run isolated Molecule unit tests for Airflow Common role"
    dir: roles/airflow_common
    silent: true
    cmds:
      - uv run molecule destroy
      - uv run molecule test
      - podman volume prune -f
      - podman network prune -f

  # ----------------------------------------------------------------------------
  # SECTION: POSTGRES
  # ----------------------------------------------------------------------------

  postgres:deploy:
    desc: "Deploy a standalone PostgreSQL instance with explicit parameters"
    deps: [check-vault]
    silent: true
    cmds:
      - >
        {{.ANSIBLE_PLAY}} {{.PLAYBOOKS}}/deploy_postgres.yml

  postgres:purge:
    desc: "Purge PostgreSQL resources for a specific instance"
    silent: true
    vars:
      postgres_purge_data: true
      postgres_purge_network: true
    cmds:
      - >
        {{.ANSIBLE_PLAY}} {{.PLAYBOOKS}}/clean_postgres.yml
        -e "postgres_purge_data={{.postgres_purge_data}}"
        -e "postgres_purge_network={{.postgres_purge_network}}"

  postgres:test:
    desc: "Run isolated Molecule unit tests for Postgres role"
    dir: roles/postgres
    silent: true
    cmds:
      - uv run molecule destroy
      - uv run molecule test
      - podman volume prune -f
      - podman network prune -f

  # ----------------------------------------------------------------------------
  # SECTION: RABBITMQ
  # ----------------------------------------------------------------------------

  rabbitmq:deploy:
    desc: "Deploy a standalone RabbitMQ broker with explicit parameters"
    deps: [check-vault]
    silent: true
    cmds:
      - >
        {{.ANSIBLE_PLAY}} {{.PLAYBOOKS}}/deploy_rabbitmq.yml

  rabbitmq:purge:
    desc: "Purge RabbitMQ resources for a specific instance"
    silent: true
    vars:
      rabbitmq_purge_data: true
      rabbitmq_purge_network: true
    cmds:
      - >
        {{.ANSIBLE_PLAY}} {{.PLAYBOOKS}}/clean_rabbitmq.yml
        -e "rabbitmq_purge_data={{.rabbitmq_purge_data}}"
        -e "rabbitmq_purge_network={{.rabbitmq_purge_network}}"

  rabbitmq:test:
    desc: "Run Molecule unit tests for RabbitMQ broker (Multi-OS)"
    dir: roles/rabbitmq
    silent: true
    cmds:
      - uv run molecule reset
      - uv run molecule test
      - podman volume prune -f
      - podman network prune -f

  # ----------------------------------------------------------------------------
  # SECTION: TEST
  # ----------------------------------------------------------------------------

  test:lint:
    desc: "Run pre-commit quality checks"
    silent: true
    cmds:
      - uv run pre-commit run --all-files

  # ----------------------------------------------------------------------------
  # SECTION: INFRA
  # ----------------------------------------------------------------------------

  infra:podman:stats:
    desc: "Show Podman resource usage (RAM/CPU)"
    silent: true
    cmds:
      - podman stats --no-stream

  infra:podman:clean:
    desc: "Remove ALL orphaned volumes and secrets (System Prune)"
    silent: true
    cmds:
      - podman volume prune -f
      - podman secret rm $(podman secret ls -q) || true

  infra:vault:edit:
    desc: "Edit encrypted secrets with Ansible Vault"
    deps: [check-vault]
    silent: true
    cmds:
      - uv run ansible-vault edit group_vars/all/vault.yml {{.VAULT_OPTS}}

  # ----------------------------------------------------------------------------
  # INTERNAL
  # ----------------------------------------------------------------------------

  check-vault:
    internal: true
    cmds:
      - test -f {{.VAULT_PASS}} || (echo "❌ Missing {{.VAULT_PASS}}! Create it first." && exit 1)
    silent: true
