---
- name: Hard Reset - Purge Airflow Infrastructure
  hosts: local

  tasks:
    - name: Purge Environment
      block:
        - name: 1. Stop and Remove all Airflow Containers
          containers.podman.podman_container:
            name: "{{ item }}"
            state: absent
          loop:
            - "{{ airflow_webserver_container_name | default('airflow_webserver') }}"
            - "{{ airflow_worker_container_name | default('airflow_worker') }}"
            - "{{ airflow_scheduler_container_name | default('airflow_scheduler') }}"
            - "{{ airflow_triggerer_container_name | default('airflow_triggerer') }}"
            - "{{ postgres_container_name | default('airflow_db') }}"
            - "{{ rabbitmq_container_name | default('airflow_mq') }}"
            - "airflow_init"
            - "airflow_create_user"

        - name: 2. Remove Podman Secrets
          containers.podman.podman_secret:
            name: "{{ item }}"
            state: absent
          loop:
            - airflow_db_conn
            - airflow_fernet_key
            - airflow_broker_url
            - airflow_admin_password
            - postgres_db_password
            - mq_password

        - name: 3. Remove Podman Volumes (Data Wipe)
          containers.podman.podman_volume:
            name: "{{ item }}"
            state: absent
          loop:
            - postgres_data
            - rabbitmq_data
            - airflow_logs
            - airflow_dags

        - name: 4. Remove Network
          containers.podman.podman_network:
            name: "{{ airflow_network | default('airflow_net') }}"
            state: absent

        - name: 5. Remove Local Temporary Files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "/tmp/airflow_bootstrap.cfg"
            - "/tmp/rabbitmq_bootstrap.conf"

      rescue:
        - name: Notify if some resources were already gone
          ansible.builtin.debug:
            msg: "Some resources could not be found, they were likely already deleted."

      always:
        - name: Final Status
          ansible.builtin.debug:
            msg: "Infrastructure successfully purged. System is clean."
