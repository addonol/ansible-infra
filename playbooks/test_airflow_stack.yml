---
- name: Full Stack Integration Test - Airflow Celery
  hosts: local
  gather_facts: false
  vars:
    # Default value if not provided in command line
    cleanup_all: false

  tasks:
    - name: Full Airflow Deployment Suite
      block:
        - name: Deploy All Roles
          ansible.builtin.include_role:
            name: "{{ item }}"
          loop:
            - postgres
            - rabbitmq
            - airflow_scheduler
            - airflow_worker
            - airflow_trigger
            - airflow_webserver

        - name: 2. Wait for Stack Initialization
          ansible.builtin.pause:
            seconds: 30

        - name: Check Webserver Health (Defines web_health)
          ansible.builtin.uri:
            url: "http://localhost:{{ airflow_webserver_port }}/health"
            status_code: 200
          register: web_health
          retries: 20
          delay: 5
          until: web_health.status == 200

        - name: Functional Check - List Celery Workers
          ansible.builtin.command: "podman exec {{ airflow_scheduler_container_name }} airflow celery list-workers"
          register: worker_list
          retries: 15
          delay: 5
          until:
            - worker_list.rc == 0
            - "'@' in worker_list.stdout"
          changed_when: false

        - name: Assert Results
          ansible.builtin.assert:
            that:
              - "web_health.status == 200"
              - "worker_list.stdout is search(airflow_worker_container_name)"
            fail_msg: "Worker not found in list. Found instead: {{ worker_list.stdout }}"
            success_msg: "AIRFLOW INFRASTRUCTURE IS FULLY OPERATIONAL!"

        - name: Final Instructions
          ansible.builtin.debug:
            msg: "Infrastructure is UP. Access UI at http://localhost:{{ airflow_webserver_port }}"
          when: not cleanup_all | bool

      always:
        - name: Final Cleanup - Purge All Resources
          when: cleanup_all | default(false) | bool
          block:
            - name: 1. Remove All Containers
              containers.podman.podman_container:
                name: "{{ item }}"
                state: absent
              loop:
                - "{{ airflow_webserver_container_name }}"
                - "{{ airflow_worker_container_name }}"
                - "{{ airflow_scheduler_container_name }}"
                - "{{ airflow_triggerer_container_name }}"
                - "{{ postgres_container_name }}"
                - "{{ rabbitmq_container_name }}"
                - "airflow_init"
                - "airflow_create_user"

            - name: 2. Remove Podman Secrets
              containers.podman.podman_secret:
                name: "{{ item }}"
                state: absent
              loop:
                - airflow_db_conn
                - airflow_fernet_key
                - airflow_broker_url
                - airflow_admin_password
                - postgres_db_password
                - mq_password

            - name: 3. Remove Podman Volumes
              containers.podman.podman_volume:
                name: "{{ item }}"
                state: absent
              loop:
                - postgres_data
                - rabbitmq_data
                - airflow_dags
                - airflow_logs

            - name: 4. Remove Network
              containers.podman.podman_network:
                name: "{{ airflow_network }}"
                state: absent

            - name: 5. Remove Temporary Config Files
              ansible.builtin.file:
                path: "{{ item }}"
                state: absent
              loop:
                - "/tmp/airflow_bootstrap.cfg"
                - "/tmp/rabbitmq_bootstrap.conf"
