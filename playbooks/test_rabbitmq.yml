---
- name: Unit Test - RabbitMQ Role
  hosts: local
  gather_facts: false

  tasks:
    - name: RabbitMQ Test Suite
      block:
        - name: 1. Deploy Role
          ansible.builtin.include_role:
            name: rabbitmq

        - name: 2. Security Check - Inspect Metadata
          ansible.builtin.command: "podman inspect {{ rabbitmq_container_name }}"
          register: mq_inspect
          changed_when: false

        - name: 3. Functional Check - Check RabbitMQ Status & Auth
          ansible.builtin.command: "podman exec {{ rabbitmq_container_name }} rabbitmqctl ping"
          register: mq_ping
          changed_when: false
          retries: 10
          delay: 5
          until: mq_ping.rc == 0

        - name: 3.1. Functional Check - List Users (Verify Admin)
          ansible.builtin.command: "podman exec {{ rabbitmq_container_name }} rabbitmqctl list_users"
          register: mq_users
          retries: 10
          delay: 5
          until: mq_users.rc == 0
          changed_when: false

        - name: 3.2. HTTP Check - Management UI
          ansible.builtin.uri:
            url: "http://localhost:{{ rabbitmq_management_port }}"
            status_code: 200

        - name: 4. Assert Results
          ansible.builtin.assert:
            that:
              - "mq_ping.rc == 0"
              - "rabbitmq_user in mq_users.stdout"
              - "vault_rabbitmq_password not in mq_inspect.stdout"
            fail_msg: "RabbitMQ functional or security check failed!"
            success_msg: "RabbitMQ is FULLY OPERATIONAL and SECURE."

      always:
        - name: Final Cleanup - Purge All Resources
          when: cleanup_all | default(false) | bool
          block:
            - name: 1. Remove Containers
              containers.podman.podman_container:
                name: "{{ rabbitmq_container_name }}"
                state: absent

            - name: 2. Remove Podman Secret
              containers.podman.podman_secret:
                name: "{{ mq_password }}"
                state: absent

            - name: 4. Remove Network
              containers.podman.podman_network:
                name: "{{ airflow_network }}"
                state: absent

            - name: 5. Remove Temporary Config Files
              ansible.builtin.file:
                path: "/tmp/rabbitmq_bootstrap.conf"
                state: absent
