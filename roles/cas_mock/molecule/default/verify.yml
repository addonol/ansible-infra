---

- name: Verify CAS Mock Role Deployment
  hosts: all:!localhost
  gather_facts: false
  vars_files:
    - test_vars.yml

  tasks:
    - name: Set cleanup facts
      ansible.builtin.set_fact:
        cas_mock_delegate_host: "{{ (molecule_yml is defined) | ternary('localhost', inventory_hostname) }}"

    - name: "Run the role's built-in verification"
      ansible.builtin.include_role:
        name: cas_mock
        tasks_from: verify.yml
      vars:
        cas_mock_hostname: "127.0.0.1"
        cas_mock_port_host: "{{ test_cas_mock_port_host | int }}"

    - name: "Functional Check - Validate CAS login page via HTTP from host"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ test_cas_mock_port_host }}/cas/login"
        method: GET
        status_code: 200
      register: cas_mock_http_query
      delegate_to: "{{ cas_mock_delegate_host }}"

    - name: "Final Assert - CAS Mock Integrity"
      ansible.builtin.assert:
        that:
          - "cas_mock_http_query.status == 200"
        success_msg: "SUCCESS: Molecule instance {{ inventory_hostname }} is fully functional!"
