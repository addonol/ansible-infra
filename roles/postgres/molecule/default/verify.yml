---

- name: Verify Postgres Role Deployment
  hosts: all:!localhost
  gather_facts: false
  vars_files:
    - test_vars.yml

  tasks:
    - name: Set cleanup facts
      ansible.builtin.set_fact:
        postgres_delegate_host: "{{ (molecule_yml is defined) | ternary('localhost', inventory_hostname) }}"

    - name: "Run the role's built-in verification"
      ansible.builtin.include_role:
        name: postgres
        tasks_from: verify.yml
      vars:
        postgres_instance: "{{ test_postgres_instance }}"
        postgres_db_pass: "{{ test_postgres_db_pass }}"

    - name: "Functional Check - Execute SQL query from host"
      ansible.builtin.command: >
        podman exec {{ test_postgres_instance }}
        psql -U {{ test_postgres_db_user }} -d {{ test_postgres_db_name }} -c "SELECT 1;"
      register: postgres_sql_query
      changed_when: false
      delegate_to: "{{ postgres_delegate_host }}"

    - name: "Final Assert - Database Integrity"
      ansible.builtin.assert:
        that:
          - "'(1 row)' in postgres_sql_query.stdout"
        success_msg: "SUCCESS: Molecule instance {{ inventory_hostname }} is fully functional!"
