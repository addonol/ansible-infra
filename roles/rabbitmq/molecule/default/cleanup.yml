---

- name: Cleanup for Molecule RabbitMQ Tests
  hosts: all:!localhost
  gather_facts: false
  vars_files:
    - test_vars.yml

  tasks:
    - name: "Purge Molecule resources for each tested OS"
      ansible.builtin.include_role:
        name: rabbitmq
        tasks_from: clean.yml
      vars:
        rabbitmq_instance: "{{ test_rabbitmq_instance }}"
        rabbitmq_volume: "{{ test_rabbitmq_volume }}"
        rabbitmq_network: "{{ test_rabbitmq_network }}"
        rabbitmq_secret_name: "{{ test_rabbitmq_secret_name }}"
        rabbitmq_purge_data: "{{ test_rabbitmq_purge_data }}"
        rabbitmq_purge_network: "{{ test_rabbitmq_purge_network }}"
